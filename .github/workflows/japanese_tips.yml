name: Thai Japanese Tips Auto Poster

on:
  schedule:
    # 1日に4回 (UTC 0:00, 6:00, 12:00, 18:00 -> JST 9:00, 15:00, 21:00, 3:00) 実行
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  post-tips:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Japanese Tips Poster
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python japanese_tips_poster.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add history.json
        if ! git diff --cached --exit-code; then
          git commit -m "chore: update japanese tips history [skip ci]"
          git push
        else
          echo "No changes in history.json"
        fi
