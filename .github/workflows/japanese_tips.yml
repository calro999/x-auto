name: Thai Japanese Tips Auto Poster

on:
  schedule:
    # 1日に5回実行 (UTC 0:00, 5:00, 10:00, 15:00, 20:00 -> JST 9:00, 14:00, 19:00, 0:00, 5:00)
    - cron: '0 0,5,10,15,20 * * *'
  workflow_dispatch:

jobs:
  post-tips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Checkout yui-universe repository
      uses: actions/checkout@v4
      with:
        repository: 'calro999/yui-universe'
        path: 'yui-universe'
        # プライベートリポジトリの場合は、以下のようにPATトークンを設定する必要があります
        # token: ${{ secrets.YUI_UNIVERSE_GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run SNS Posts Generator
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python generate_sns_posts.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add output/ used_articles.txt
        if ! git diff --cached --exit-code; then
          git commit -m "chore: generate new Thai SNS posts [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
